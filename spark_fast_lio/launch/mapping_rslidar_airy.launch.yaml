---
launch:
  - arg: {name: start_rviz, default: 'true'}

  # Frames
  - arg: {name: map_frame,  default: 'map'}
  - arg: {name: base_frame, default: 'base_link'}

  - arg: {name: rviz_path,   default: $(find-pkg-share spark_fast_lio)/rviz/velodyne_mit.rviz}
  - arg: {name: config_path, default: $(find-pkg-share spark_fast_lio)/config/rslidar.yaml}

  - node:
      pkg: spark_fast_lio
      exec: spark_lio_mapping
      name: lio_mapping
      output: screen
      on_exit: shutdown

      remap:
        - { from: 'lidar', to: '/rslidar_points' }
        - { from: 'imu',   to: '/rslidar_imu_converted' }

      param:
        - name: "use_sim_time"
          value: true  
        - name: "common.lidar_frame"
          value: "rslidar"
        - name: "common.imu_frame"
          value: "rslidar"
        - name: "common.map_frame"
          value: "$(var map_frame)"
        - name: "common.base_frame"
          value: "$(var base_frame)"
        - name: "common.visualization_frame"
          value: "imu"

        - name: "gravity_alignment.enable_gravity_alignment"
          value: false

        - from: $(var config_path)

  - node:
      if: $(var start_rviz)
      pkg: rviz2
      exec: rviz2
      name: "rviz"
      launch-prefix: "nice"
      output: "screen"
      args: >
        -d $(var rviz_path)
      param:
        - name: "use_sim_time"
          value: true  
      